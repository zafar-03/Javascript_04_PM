<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 50vw;
            margin: auto;
            display: none;
            flex-direction: column;
            gap: 10px;

        }
        thead,tbody{
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;

        }
        tr{
            display: flex;
            gap: 10px;
        }
        td,th{
            flex-grow: 1;
            border: 2px solid blue;
        }
        table,tr,td,th{
            color: darkblue;
            font-family: calibri;
            font-size: 24px;
        }
        section{
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        button{
            padding: 10px 20px;
            font-family: verdana;
            font-size: 24px;
            color: white;
            background-color: black;
            border: none;
            border-radius: 16px;
            transition: all 0.3s;
            cursor: pointer;
        }
        button:hover{
            color: lightgray;
            background-color: rgb(22, 22, 22);
            transform: scale(1.1);
        }
        .show{
            display: flex;
        }
    </style>
</head>
<body>
    <section>
        <button class="display">Display Data</button>
        <button class="add">Add New Data</button>
        <button class="update">Update Data</button>
        <button class="delete">Delete Data</button>
    </section>
    <table border="">
        <thead>
            <tr>
                <th>Sr No.</th>
                <th>Name</th>
                <th>Age</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            
        </tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
